[settings]
experimental = true
env_shell_expand = true

[env]
BASH_COMP_DIR = "${HOME}/.local/share/bash-completion/completions"
ZSH_COMP_DIR = "${HOME}/.local/share/zsh/site-functions"

[hooks]
preinstall = """
mkdir -p $BASH_COMP_DIR $ZSH_COMP_DIR
"""

[tools]

# https://usage.jdx.dev/
usage = { version = "latest", postinstall = """
usage --completions bash >| "${BASH_COMP_DIR}/usage"
usage --completions zsh >| "${ZSH_COMP_DIR}/_usage"
""" }

# https://github.com/sharkdp/bat
bat = { version = "latest", postinstall = """
bat --completion bash >| "${BASH_COMP_DIR}/bat"
bat --completion zsh >| "${ZSH_COMP_DIR}/_bat"
""" }


ripgrep = "latest" # (rg) grep
fd = "latest" # find
starship = "latest" # bash
zoxide = "latest" # cd
eza = "latest" # ls
zellij = "latest" # tmux
delta = "latest" # git diff
bottom = "latest" # (btm) top
dust = "latest" # du
bun = "latest"
rust = "latest"
java = "zulu-javafx-8"
node = "latest"
gh = "latest"
go = "latest"
"github:badlogic/pi-mono" = "latest" # pi
opencode = "latest"
gemini = "latest"
"aqua:rossmacarthur/sheldon" = "latest"
atuin = "latest"

[shell_alias]
cat = "bat"
l = "eza -la --git --hyperlink --group-directories-first --icons"
ls = "eza --hyperlink --group-directories-first" # ls
".." = "cd .."
"..." = "cd ../.."
"...." = "cd ../../.."
"....." = "cd ../../../.."



